name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Build app
        env:
          GITHUB_PAGES: "true"
          VITE_SUPABASE_URL: https://nohpohynhcjyirqaxjax.supabase.co
          VITE_SUPABASE_ANON_KEY: sb_publishable_7Xp6LoL6pA-s4ZNCaj74XQ_We4KUdHB
          VITE_ACCESS_PASSWORD: emilyinparis
          VITE_APP_BASE_PATH: /roistat-dashboard-tg/
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
